<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rahula College Football — Admin Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #050508;
      --panel:   #0a0d18;
      --panel2:  #0f1422;
      --blue:    #1e6fff;
      --blue2:   #0051cc;
      --gold:    #d4af37;
      --gold2:   #f5d76e;
      --text:    #eef2ff;
      --muted:   #6b7fa8;
      --border:  rgba(255,255,255,0.06);
      --glow-b:  rgba(30, 111, 255, 0.35);
      --glow-g:  rgba(212, 175, 55, 0.35);
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(30,111,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,111,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridPan 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridPan {
      0%   { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    /* Gold top accent bar */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--blue), var(--gold), transparent);
      animation: shimmer 4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }

    .login-wrap {
      width: 100%;
      max-width: 440px;
      padding: 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* Floating glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }
    .orb-blue {
      width: 400px; height: 400px;
      background: var(--glow-b);
      top: -100px; right: -100px;
      animation-delay: 0s;
    }
    .orb-gold {
      width: 300px; height: 300px;
      background: var(--glow-g);
      bottom: -80px; left: -80px;
      animation-delay: -4s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(20px, -20px) scale(1.05); }
    }

    .login-card {
      background: var(--panel);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow:
        0 0 0 1px rgba(30,111,255,0.08),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
    }

    /* Subtle inner glow at top of card */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.6;
    }

    .login-crest {
      display: block;
      margin: 0 auto 1.5rem;
      height: 70px;
      filter: drop-shadow(0 4px 16px rgba(212,175,55,0.3));
    }

    .login-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.75rem;
      font-weight: 900;
      text-align: center;
      letter-spacing: 0.08em;
      margin-bottom: 0.25rem;
    }
    .login-title .gold { color: var(--gold); }
    .login-title .blue { color: var(--blue); }

    .login-sub {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .field-group {
      margin-bottom: 1.5rem;
    }

    .field-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
    }

    .field-input-wrap {
      position: relative;
    }

    .field-input-wrap .lock-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      opacity: 0.4;
    }

    .field-input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(30,111,255,0.15);
    }
    .field-input::placeholder { color: var(--muted); }

    .login-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(30,111,255,0.4);
    }
    .login-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }
    .login-btn:hover::after { transform: translateX(100%); }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(30,111,255,0.5); }
    .login-btn:active { transform: translateY(0); }

    .error-msg {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(255,60,60,0.08);
      border: 1px solid rgba(255,60,60,0.25);
      border-radius: 8px;
      color: #ff6b6b;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }
    .error-msg.show { display: block; }

    .login-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .login-footer span { color: var(--gold); font-weight: 600; }
  </style>
</head>
<body>
  <div class="orb orb-blue"></div>
  <div class="orb orb-gold"></div>

  <div class="login-wrap">
    <div class="login-card">
      <img class="login-crest" src="/Rahula-Crest-SinhalaRGB.png" alt="Rahula Crest"
           onerror="this.src='https://placehold.co/80/050508/d4af37?text=RC'">

      <h1 class="login-title">
        <span class="gold">ADMIN</span><span class="blue"> PORTAL</span>
      </h1>
      <p class="login-sub">Rahula College Football — Secure Access</p>

      <div class="field-group">
        <label class="field-label" for="passwordInput">Admin Password</label>
        <div class="field-input-wrap">
          <span class="lock-icon">🔒</span>
          <input class="field-input" id="passwordInput" type="password"
                 placeholder="Enter admin password…" autocomplete="current-password">
        </div>
      </div>

      <button class="login-btn" id="loginBtn">ENTER ADMIN PANEL</button>

      <div class="error-msg" id="errorMsg">
        ❌ Incorrect password. Please try again.
      </div>

      <div class="login-footer">
        Authorised access only · <span>Rahula College Football</span>
      </div>
    </div>
  </div>

  <script>
    const loginBtn   = document.getElementById('loginBtn');
    const passInput  = document.getElementById('passwordInput');
    const errorMsg   = document.getElementById('errorMsg');

    async function attemptLogin() {
      const password = passInput.value;
      if (!password) { passInput.focus(); return; }

      loginBtn.textContent = 'VERIFYING…';
      loginBtn.disabled = true;
      errorMsg.classList.remove('show');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.success) {
          loginBtn.textContent = '✓ ACCESS GRANTED';
          setTimeout(() => { window.location.href = '/admin'; }, 500);
        } else {
          errorMsg.classList.add('show');
          loginBtn.textContent = 'ENTER ADMIN PANEL';
          loginBtn.disabled = false;
          passInput.value = '';
          passInput.focus();
        }
      } catch (err) {
        errorMsg.textContent = '❌ Connection error. Try again.';
        errorMsg.classList.add('show');
        loginBtn.textContent = 'ENTER ADMIN PANEL';
        loginBtn.disabled = false;
      }
    }

    loginBtn.addEventListener('click', attemptLogin);
    passInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });
  </script>
</body>
</html>
